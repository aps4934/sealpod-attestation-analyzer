artifacts = ["/app/app.py", "/app/client.py"]

[task]
name = "security/sealpod-attestation-analyzer"
description = "Reverse-engineer the undocumented SealPod container attestation format and repair the Flask analysis API and client Graphviz script."

[metadata]
author_name = "anonymous"
author_email = "anonymous@example.com"
difficulty = "hard"
category = "security"
subcategories = ["api_integration"]
model_tested = "Opus-4.8"
agent_tested = "Terminus-2"
task_objective = ["reverse-engineering", "debug", "fix"]
artifact_type = ["codebase"]
expert_time_estimate_hours = 3
expert_time_estimate_min = 180
junior_time_estimate_min = 300
difficulty_explanation = "This task is Hard because it requires reverse-engineering an undocumented cryptographic signature verification and payload canonicalization protocol from a large context file (the incident transcript). The agent must identify that payloads require RFC8785 canonicalization and base64url encoding/decoding, verify ECDSA SHA256 signatures, validate X.509 certificate chains including intermediate CAs, and align with a strict Flask endpoint contract and Graphviz DOT graph syntax."
solution_explanation = "The solution patches app.py to canonicalize JSON using a standard RFC8785 library (or sorted keys with compact whitespace), decode signatures using urlsafe base64, validate certificates using the trusted root and intermediate chain, and return the correct API responses. It also completes client.py to query the verified packages against the local mock OSV service and generate a valid DOT graph linking signer, layers, packages, and CVEs."
verification_explanation = "The verifier suite runs a set of pytest checks testing signature verification with valid and invalid signatures, untrusted chains, package parsing from the attestation payload, local mock OSV.dev integration, and the correctness of the generated Graphviz DOT output."
number_of_milestones = 0
codebase_size = "minimal"
languages = ["python"]
tags = ["security", "cryptography", "container-security", "flask", "graphviz"]

